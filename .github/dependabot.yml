version: 2
updates:
  # Keep GitHub Actions pinned to current, patched versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # The SDK ships zero runtime deps, so everything here is dev tooling.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      dev-dependencies:
        patterns:
          - "*"
