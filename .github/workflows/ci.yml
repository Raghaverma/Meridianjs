name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Level 1: Fast gate ───────────────────────────────────────────────────────
jobs:
  validate:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

# ─── Level 1: Unit tests across Node versions ────────────────────────────────
  unit-tests:
    name: Unit Tests — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Covers routing, policy, transaction, analytics, debug, schema tests
      - run: npm test -- --run --reporter=verbose

# ─── Level 1: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

# ─── Level 2 & 3: Adapter contract tests — all 39 providers in parallel ──────
  contract-tests:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        provider:
          # Payments
          - stripe
          - razorpay
          - cashfree
          - payu
          - juspay
          - braintree
          - adyen
          - klarna
          - mollie
          - phonepe
          - checkout
          # AI / LLM
          - openai
          - anthropic
          - gemini
          - cohere
          - mistral
          # Communications
          - twilio
          - sendgrid
          - mailgun
          - vonage
          - msg91
          - exotel
          - gupshup
          # KYC / Identity
          - hyperverge
          - digio
          - karza
          - idfy
          - setu
          - decentro
          - perfios
          # Developer / CRM / Auth
          - github
          - hubspot
          - supabase
          - auth0
          # Logistics
          - shiprocket
          - delhivery
          # Other
          - mapmyindia
          - cleartax
          - apollo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run contract — ${{ matrix.provider }}
        run: npm run test:contracts ${{ matrix.provider }}

# ─── Level 4: Generator scaffold & compile verification ──────────────────────
  generator-verify:
    name: Generator — Scaffold & Compile
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate test adapter
        run: node dist/generator/cli.js generate --provider ci-generated --base-url https://api.ci.test --output src/providers/ci-generated
      - name: Verify generated files exist
        run: |
          test -f src/providers/ci-generated/adapter.ts
          test -f src/providers/ci-generated/adapter.test.ts
          test -f src/providers/ci-generated/pagination.ts
          test -f src/providers/ci-generated/index.ts
          echo "All generated files present"
      - name: Typecheck generated adapter
        run: npm run typecheck
      - name: Run generated tests (8 tests must pass)
        run: npm test -- --run src/providers/ci-generated/adapter.test.ts

# ─── Level 6: Benchmarks ─────────────────────────────────────────────────────
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run benchmarks
        run: npm run benchmark 2>&1 | tee benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 30
      - name: Post benchmark summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# ─── Level 10: Security scanning ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - name: Check for hardcoded secrets
        run: |
          # Fail if any API keys or tokens look hardcoded in src/
          if grep -rn --include="*.ts" \
            -E "(sk-[a-zA-Z0-9]{32,}|sk_live_[a-zA-Z0-9]+|AIza[0-9A-Za-z_-]{35}|Bearer [a-zA-Z0-9]{32,})" \
            src/ 2>/dev/null | grep -v "test\|mock\|placeholder\|example\|\.test\.ts"; then
            echo "Potential hardcoded secret found. Review the above lines."
            exit 1
          fi
          echo "No hardcoded secrets detected"

# ─── Level 11: Package quality gates ─────────────────────────────────────────
  package-quality:
    name: Package Quality Gates
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Required files present
        run: |
          test -f README.md    && echo "README.md ✓"
          test -f LICENSE.md   && echo "LICENSE.md ✓"
          test -f CHANGELOG.md && echo "CHANGELOG.md ✓"
      - name: Verify package exports are importable
        run: node -e "import('./dist/public.js').then(m => { const keys = Object.keys(m); console.log(keys.length + ' exports found'); if (keys.length < 20) { console.error('Too few exports — build may be broken'); process.exit(1); } })"
      - name: publint — validate package.json exports
        run: npx publint
      - name: are-the-types-wrong — validate TypeScript types
        run: npx are-the-types-wrong . --pack || echo "Type warnings noted (non-blocking)"

# ─── Datadog synthetic tests (optional — runs if DD secrets configured) ───────
  datadog-synthetics:
    name: Datadog Synthetics
    needs: [unit-tests, contract-tests, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Datadog credentials
        id: dd_creds
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          if [ -n "$DD_API_KEY" ] && [ -n "$DD_APP_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Datadog credentials not configured — skipping"
          fi
      - name: Run Datadog Synthetic tests
        if: steps.dd_creds.outputs.enabled == 'true'
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: tag:e2e-tests
