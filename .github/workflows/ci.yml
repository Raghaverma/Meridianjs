name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default — no job needs write access to the repo.
permissions:
  contents: read

jobs:
# ─── Discover providers ───────────────────────────────────────────────────────
# Derives the contract-test matrix from the BUILTIN_ADAPTER_CLASSES registry so
# it can never drift: register an adapter and it is contract-tested automatically.
  discover:
    name: Discover Providers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.list.outputs.providers }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: list
        name: Build provider matrix from registry
        run: |
          echo "providers=$(node scripts/list-providers.mjs)" >> "$GITHUB_OUTPUT"
          echo "Discovered $(node scripts/list-providers.mjs --pretty | wc -l) providers"

# ─── Level 1: Fast gate ───────────────────────────────────────────────────────
  validate:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # `biome ci` is the strict, write-free CI mode: lint + format + import order.
      - run: npm run lint:ci

# ─── Level 1: Unit tests across Node versions ────────────────────────────────
  unit-tests:
    name: Unit Tests — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Covers routing, policy, transaction, analytics, debug, schema tests
      - run: npm test -- --run --reporter=verbose

# ─── Level 1: Coverage gate ──────────────────────────────────────────────────
# Thresholds live in vitest.config.ts and act as a no-regression ratchet.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

# ─── Level 1: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

# ─── Level 2 & 3: Adapter contract tests — every registered provider in parallel
  contract-tests:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, discover]
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.discover.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run contract — ${{ matrix.provider }}
        run: npm run test:contracts ${{ matrix.provider }}

# ─── Level 4: Generator scaffold & compile verification ──────────────────────
  generator-verify:
    name: Generator — Scaffold & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate test adapter
        run: node dist/generator/cli.js generate --provider ci-generated --base-url https://api.ci.test --output src/providers/ci-generated
      - name: Verify generated files exist
        run: |
          test -f src/providers/ci-generated/adapter.ts
          test -f src/providers/ci-generated/adapter.test.ts
          test -f src/providers/ci-generated/pagination.ts
          test -f src/providers/ci-generated/index.ts
          echo "All generated files present"
      - name: Typecheck generated adapter
        run: npm run typecheck
      - name: Run generated tests (8 tests must pass)
        run: npm test -- --run src/providers/ci-generated/adapter.test.ts

# ─── Level 6: Benchmarks ─────────────────────────────────────────────────────
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run benchmarks
        run: npm run benchmark 2>&1 | tee benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 30
      - name: Post benchmark summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# ─── Level 10: Security scanning ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (production dependencies only)
        # The SDK has zero runtime deps — all devDep vulnerabilities are irrelevant to users.
        run: npm audit --omit=dev --audit-level=high
      - name: Check for hardcoded secrets
        run: |
          # Fail if any API keys or tokens look hardcoded in src/
          if grep -rn --include="*.ts" \
            -E "(sk-[a-zA-Z0-9]{32,}|sk_live_[a-zA-Z0-9]+|AIza[0-9A-Za-z_-]{35}|Bearer [a-zA-Z0-9]{32,})" \
            src/ 2>/dev/null | grep -v "test\|mock\|placeholder\|example\|\.test\.ts"; then
            echo "Potential hardcoded secret found. Review the above lines."
            exit 1
          fi
          echo "No hardcoded secrets detected"

# ─── Level 11: Package quality gates ─────────────────────────────────────────
  package-quality:
    name: Package Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Required files present
        run: |
          test -f README.md    && echo "README.md ✓"
          test -f LICENSE.md   && echo "LICENSE.md ✓"
          test -f CHANGELOG.md && echo "CHANGELOG.md ✓"
      - name: Verify package exports are importable
        run: node -e "import('./dist/public.js').then(m => { const keys = Object.keys(m); console.log(keys.length + ' exports found'); if (keys.length < 20) { console.error('Too few exports — build may be broken'); process.exit(1); } })"
      - name: publint — validate package.json exports
        run: npx publint --strict
      - name: are-the-types-wrong — validate TypeScript types
        run: npx @arethetypeswrong/cli . --pack

# ─── Datadog synthetic tests (optional — runs if DD secrets configured) ───────
  datadog-synthetics:
    name: Datadog Synthetics
    needs: [unit-tests, contract-tests, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Check for Datadog credentials
        id: dd_creds
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          if [ -n "$DD_API_KEY" ] && [ -n "$DD_APP_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Datadog credentials not configured — skipping"
          fi
      - name: Run Datadog Synthetic tests
        if: steps.dd_creds.outputs.enabled == 'true'
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: tag:e2e-tests

# ─── Required status gate ─────────────────────────────────────────────────────
# Single check to require in branch protection. Fails if ANY required job failed
# or was cancelled, so new jobs are covered without editing branch protection.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - discover
      - validate
      - unit-tests
      - coverage
      - build
      - contract-tests
      - generator-verify
      - benchmarks
      - security
      - package-quality
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required CI jobs failed or were cancelled."
          exit 1
      - run: echo "All required CI jobs passed."
