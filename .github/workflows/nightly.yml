name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC daily
  workflow_dispatch:        # allow manual trigger

# Least privilege by default; the failure reporter opts into issues: write.
permissions:
  contents: read

jobs:
# ─── Discover providers (dynamic contract-test matrix) ────────────────────────
  discover:
    name: Discover Providers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.list.outputs.providers }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: list
        run: echo "providers=$(node scripts/list-providers.mjs)" >> "$GITHUB_OUTPUT"

# ─── Full test suite on latest Node ───────────────────────────────────────────
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:ci
      - run: npm run test:coverage
      - run: npm run build

# ─── Level 2 & 3: Every registered adapter in parallel ─────────────────────────
  contract-tests-all:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [discover]
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.discover.outputs.providers) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:contracts ${{ matrix.provider }}

# ─── Level 6: Benchmark baseline ──────────────────────────────────────────────
  benchmark-baseline:
    name: Benchmark Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [full-test-suite]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
      - name: Run benchmarks
        run: npm run benchmark 2>&1 | tee nightly-benchmark.txt
      - name: Upload benchmark baseline
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-${{ github.run_id }}
          path: nightly-benchmark.txt
          retention-days: 90
      - name: Post to step summary
        run: |
          echo "## Nightly Benchmark — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat nightly-benchmark.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# ─── Level 5: Schema drift detection ──────────────────────────────────────────
# Fetches live responses from providers (requires API key secrets).
# If a key is missing the step is skipped — it never blocks the pipeline.
  drift-detection:
    name: Schema Drift Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [full-test-suite]
    continue-on-error: true
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
      - name: Check Stripe schema drift
        if: env.STRIPE_SECRET_KEY != ''
        run: |
          node -e "
          import('./dist/public.js').then(async ({ Meridian }) => {
            const m = await Meridian.create({
              localUnsafe: true,
              providers: { stripe: { auth: { apiKey: process.env.STRIPE_SECRET_KEY } } }
            });
            const r = await m.provider('stripe').get('/v1/customers?limit=1');
            const drifts = await m.schema.check('stripe', '/v1/customers', r.data);
            if (drifts.length > 0) {
              console.error('DRIFT DETECTED:', JSON.stringify(drifts, null, 2));
              process.exit(1);
            }
            console.log('Stripe: no schema drift detected');
          });
          "
      - name: Check GitHub schema drift
        if: env.GITHUB_TOKEN != ''
        run: |
          node -e "
          import('./dist/public.js').then(async ({ Meridian }) => {
            const m = await Meridian.create({
              localUnsafe: true,
              providers: { github: { auth: { token: process.env.GITHUB_TOKEN } } }
            });
            const r = await m.provider('github').get('/user');
            const drifts = await m.schema.check('github', '/user', r.data);
            if (drifts.length > 0) {
              console.error('DRIFT DETECTED:', JSON.stringify(drifts, null, 2));
              process.exit(1);
            }
            console.log('GitHub: no schema drift detected');
          });
          "

# ─── Open a GitHub Issue if nightly fails ─────────────────────────────────────
  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [full-test-suite, contract-tests-all, benchmark-baseline, drift-detection]
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Open issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly CI failure — ${date}`,
              body: `The nightly CI run failed on ${date}.\n\n**Run:** ${runUrl}\n\nCheck the run logs for details. This issue was opened automatically.`,
              labels: ['ci-failure', 'automated']
            });
