name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege by default. Jobs that publish / create releases opt in below.
permissions:
  contents: read

jobs:
# ─── Discover providers (dynamic contract-test matrix) ────────────────────────
  discover:
    name: Discover Providers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.list.outputs.providers }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: list
        run: echo "providers=$(node scripts/list-providers.mjs)" >> "$GITHUB_OUTPUT"

# ─── Full validation before publish ──────────────────────────────────────────
  validate:
    name: Full Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:ci
      - run: npm run test:coverage

  contract-tests:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, discover]
    strategy:
      fail-fast: true   # strict on release — any adapter failure blocks publish
      matrix:
        provider: ${{ fromJSON(needs.discover.outputs.providers) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:contracts ${{ matrix.provider }}

# ─── Verify the tag matches package.json version ──────────────────────────────
  verify-version:
    name: Verify Tag Matches package.json
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Tag must equal package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION | tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

# ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [contract-tests, verify-version]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-release
          path: dist/

# ─── Package quality gates ────────────────────────────────────────────────────
  quality-gate:
    name: Package Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-release
          path: dist/
      - run: npx publint --strict
      - run: npx @arethetypeswrong/cli . --pack
      - name: Verify exports
        run: node -e "import('./dist/public.js').then(m => console.log(Object.keys(m).length + ' exports verified'))"

# ─── Publish to npm ───────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-gate]
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-release
          path: dist/
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# ─── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish]
    permissions:
      contents: write   # create GitHub release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.txt
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('release-notes.txt', 'utf8').trim();
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Meridian ${tag}`,
              body: notes,
              draft: false,
              prerelease: tag.includes('-')
            });
