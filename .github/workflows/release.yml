name: Release

on:
  push:
    tags:
      - "v*"
  # Allows a dry run without pushing a real tag. Set dry_run=true to skip all
  # publish/push steps and just validate the changelog + build.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and validate only, skip publish/push/release'
        required: false
        default: true
        type: boolean

# Least privilege by default. Jobs that publish / create releases opt in below.
permissions:
  contents: read

jobs:
# ─── Discover providers (dynamic contract-test matrix) ────────────────────────
  discover:
    name: Discover Providers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.list.outputs.providers }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - id: list
        run: echo "providers=$(node scripts/list-providers.mjs)" >> "$GITHUB_OUTPUT"

# ─── Full validation before publish ──────────────────────────────────────────
  validate:
    name: Full Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:ci
      - run: npm run test:coverage

  contract-tests:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, discover]
    strategy:
      fail-fast: true   # strict on release — any adapter failure blocks publish
      matrix:
        provider: ${{ fromJSON(needs.discover.outputs.providers) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:contracts ${{ matrix.provider }}

# ─── Verify the tag matches package.json version ──────────────────────────────
  verify-version:
    name: Verify Tag Matches package.json
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Tag must equal package.json version
        run: |
          # Only meaningful on tag pushes; workflow_dispatch has no tag to compare.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Non-tag trigger — skipping version check."
            exit 0
          fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION | tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION. Update package.json before tagging."
            exit 1
          fi

# ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [contract-tests, verify-version]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-release
          path: dist/

# ─── Package quality gates ────────────────────────────────────────────────────
  quality-gate:
    name: Package Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-release
          path: dist/
      - run: npx publint --strict
      - run: npx @arethetypeswrong/cli . --pack --ignore-rules cjs-resolves-to-esm
      - name: Verify exports
        run: node -e "import('./dist/public.js').then(m => console.log(Object.keys(m).length + ' exports verified'))"

# ─── Publish to npm ───────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-gate]
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-release
          path: dist/
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# ─── Build and push Docker image to GHCR ─────────────────────────────────────
# Publishes ghcr.io/<owner>/meridian-proxy:v<version> and :latest.
# After the first push, set the package visibility to Public under:
# github.com/<owner> → Packages → meridian-proxy → Package settings.
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-gate]
    if: github.event_name == 'push'   # skip on workflow_dispatch dry runs
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/meridian-proxy
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:latest"

# ─── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish, docker]
    if: github.event_name == 'push'
    permissions:
      contents: write   # create GitHub release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.txt
      - name: Create GitHub Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('release-notes.txt', 'utf8').trim();
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Meridian ${tag}`,
              body: notes,
              draft: false,
              prerelease: tag.includes('-')
            });
