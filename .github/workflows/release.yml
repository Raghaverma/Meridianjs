name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # npm provenance

jobs:
# ─── Full validation before publish ──────────────────────────────────────────
  validate:
    name: Full Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --run

  contract-tests:
    name: Contract — ${{ matrix.provider }}
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: true   # strict on release — any adapter failure blocks publish
      matrix:
        provider:
          - stripe
          - razorpay
          - cashfree
          - payu
          - juspay
          - braintree
          - adyen
          - klarna
          - mollie
          - phonepe
          - checkout
          - openai
          - anthropic
          - gemini
          - cohere
          - mistral
          - twilio
          - sendgrid
          - mailgun
          - vonage
          - msg91
          - exotel
          - gupshup
          - hyperverge
          - digio
          - karza
          - idfy
          - setu
          - decentro
          - perfios
          - github
          - hubspot
          - supabase
          - auth0
          - shiprocket
          - delhivery
          - mapmyindia
          - cleartax
          - apollo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:contracts ${{ matrix.provider }}

# ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-release
          path: dist/

# ─── Package quality gates ────────────────────────────────────────────────────
  quality-gate:
    name: Package Quality Gate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-release
          path: dist/
      - run: npx publint
      - run: npx are-the-types-wrong . --pack || echo "Type warnings noted"
      - name: Verify exports
        run: node -e "import('./dist/public.js').then(m => console.log(Object.keys(m).length + ' exports verified'))"

# ─── Publish to npm ───────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [quality-gate]
    environment:
      name: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-release
          path: dist/
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# ─── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.txt
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('release-notes.txt', 'utf8').trim();
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Meridian ${tag}`,
              body: notes,
              draft: false,
              prerelease: tag.includes('-')
            });
