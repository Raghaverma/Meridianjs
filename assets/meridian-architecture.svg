<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 440" width="1200" height="440" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace" role="img" aria-label="Meridian sits between your application and every external API, applying policy, circuit breaking, rate limiting, retry, and normalization before requests reach Stripe, OpenAI, Razorpay, Anthropic, and 41 more providers.">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#D7DDE5"/>
    </pattern>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="440" rx="16" fill="#EEF1F5"/>
  <rect x="0" y="0" width="1200" height="440" rx="16" fill="url(#dots)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="438.5" rx="15.25" fill="none" stroke="#D3DAE1" stroke-width="1.5"/>

  <!-- eyebrow -->
  <text x="56" y="52" fill="#0B7C8C" font-size="12" letter-spacing="1">//</text>
  <text x="76" y="52" fill="#566571" font-size="12" letter-spacing="1">one layer between your app and every provider</text>
  <text x="1144" y="52" text-anchor="end" fill="#76828E" font-size="12" letter-spacing="2">meridian.ts</text>

  <!-- ============ connectors (hairline, marching ants) ============ -->
  <g stroke="#5AA3AE" stroke-width="1.25" fill="none">
    <path d="M256 250 L420 250" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" values="8;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M780 250 L840 250" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" values="8;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M840 193 L840 361" stroke="#C4CDD6"/>
    <path d="M840 193 L860 193 M840 235 L860 235 M840 277 L860 277 M840 319 L860 319 M840 361 L860 361" stroke="#C4CDD6"/>
  </g>

  <!-- motion paths -->
  <path id="m0" d="M256 250 L420 250" fill="none"/>
  <path id="m1" d="M780 250 L840 250 L840 193 L860 193" fill="none"/>
  <path id="m2" d="M780 250 L840 250 L840 277 L860 277" fill="none"/>
  <path id="m3" d="M780 250 L840 250 L840 361 L860 361" fill="none"/>

  <!-- traveling packets -->
  <rect x="-2" y="-2" width="4" height="4" fill="#0B7C8C">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath xlink:href="#m0"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="-2" y="-2" width="4" height="4" fill="#0B7C8C">
    <animateMotion dur="1.7s" begin="0.3s" repeatCount="indefinite"><mpath xlink:href="#m1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="-2" y="-2" width="4" height="4" fill="#0B7C8C">
    <animateMotion dur="1.7s" begin="0.9s" repeatCount="indefinite"><mpath xlink:href="#m2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="-2" y="-2" width="4" height="4" fill="#0B7C8C">
    <animateMotion dur="1.7s" begin="1.4s" repeatCount="indefinite"><mpath xlink:href="#m3"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" begin="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- ============ App node ============ -->
  <rect x="56" y="196" width="200" height="108" rx="10" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
  <text x="72" y="228" fill="#76828E" font-size="11" letter-spacing="2">CALLER</text>
  <text x="156" y="252" text-anchor="middle" fill="#10212C" font-size="16">your_app</text>
  <text x="156" y="276" text-anchor="middle" fill="#566571" font-size="12">.service("pay")</text>

  <!-- ============ Meridian node ============ -->
  <rect x="420" y="140" width="360" height="220" rx="12" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
  <!-- HUD corner brackets -->
  <g stroke="#0B7C8C" stroke-width="1.75" fill="none">
    <path d="M420 154 L420 140 L434 140"/>
    <path d="M766 140 L780 140 L780 154"/>
    <path d="M420 346 L420 360 L434 360"/>
    <path d="M766 360 L780 360 L780 346"/>
  </g>
  <text x="438" y="178" fill="#10212C" font-size="19" letter-spacing="0.5">meridian</text>
  <text x="438" y="198" fill="#0B7C8C" font-size="10.5" letter-spacing="3">API RELIABILITY LAYER</text>
  <line x1="438" y1="212" x2="762" y2="212" stroke="#E4E9EE" stroke-width="1"/>

  <!-- numbered pipeline -->
  <g font-size="13.5">
    <text x="438" y="240" fill="#0B7C8C">01</text><text x="470" y="240" fill="#2C3A46">policy</text>
    <text x="762" y="240" text-anchor="end" fill="#76828E" font-size="11">guard · redact</text>

    <text x="438" y="268" fill="#0B7C8C">02</text><text x="470" y="268" fill="#2C3A46">circuit breaker</text>
    <text x="762" y="268" text-anchor="end" fill="#76828E" font-size="11">per-provider</text>

    <text x="438" y="296" fill="#0B7C8C">03</text><text x="470" y="296" fill="#2C3A46">rate limit</text>
    <text x="762" y="296" text-anchor="end" fill="#76828E" font-size="11">normalized</text>

    <text x="438" y="324" fill="#0B7C8C">04</text><text x="470" y="324" fill="#2C3A46">retry</text>
    <text x="762" y="324" text-anchor="end" fill="#76828E" font-size="11">idempotency-safe</text>

    <text x="438" y="352" fill="#0B7C8C">05</text><text x="470" y="352" fill="#2C3A46">normalize</text>
    <text x="762" y="352" text-anchor="end" fill="#76828E" font-size="11">one error shape</text>
  </g>

  <!-- ============ Providers ============ -->
  <text x="860" y="172" fill="#76828E" font-size="11" letter-spacing="2">PROVIDERS</text>
  <g font-size="13">
    <rect x="860" y="178" width="284" height="30" rx="7" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
    <text x="880" y="197" fill="#2C3A46">stripe</text><circle cx="1124" cy="193" r="2.5" fill="#0B7C8C"/>

    <rect x="860" y="220" width="284" height="30" rx="7" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
    <text x="880" y="239" fill="#2C3A46">openai</text><circle cx="1124" cy="235" r="2.5" fill="#0B7C8C"/>

    <rect x="860" y="262" width="284" height="30" rx="7" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
    <text x="880" y="281" fill="#2C3A46">razorpay</text><circle cx="1124" cy="277" r="2.5" fill="#0B7C8C"/>

    <rect x="860" y="304" width="284" height="30" rx="7" fill="#FFFFFF" stroke="#CCD4DD" stroke-width="1.25"/>
    <text x="880" y="323" fill="#2C3A46">anthropic</text><circle cx="1124" cy="319" r="2.5" fill="#0B7C8C"/>

    <rect x="860" y="346" width="284" height="30" rx="7" fill="#EEF1F5" stroke="#C0C9D3" stroke-width="1.25" stroke-dasharray="4 4"/>
    <text x="880" y="365" fill="#566571">+41 more</text>
  </g>

  <!-- ============ footer metrics ============ -->
  <line x1="56" y1="398" x2="1144" y2="398" stroke="#E4E9EE" stroke-width="1"/>
  <g font-size="12" fill="#566571">
    <text x="56" y="422"><tspan fill="#2C3A46">0.11ms</tspan> overhead</text>
    <text x="300" y="422"><tspan fill="#2C3A46">27ms</tspan> failover</text>
    <text x="520" y="422"><tspan fill="#2C3A46">45</tspan> providers</text>
    <text x="740" y="422"><tspan fill="#2C3A46">855</tspan> contract tests</text>
    <text x="1000" y="422"><tspan fill="#2C3A46">0</tspan> runtime deps</text>
  </g>
  <g fill="#5AA3AE">
    <text x="244" y="422">·</text>
    <text x="464" y="422">·</text>
    <text x="684" y="422">·</text>
    <text x="944" y="422">·</text>
  </g>
</svg>
